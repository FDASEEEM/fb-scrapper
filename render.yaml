services:
  - type: worker
    name: fb-marketplace-scraper
    runtime: docker
    plan: free
    envVars:
      - key: FB_EMAIL
        sync: false
      - key: FB_PASSWORD
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: SEARCH_KEYWORDS
        sync: false
      - key: SEARCH_CATEGORIES
        sync: false
      - key: MARKETPLACE_CITIES
        value: "vina-del-mar,valparaiso"
      - key: SEARCH_RADIUS_KM
        value: "30"
      - key: CHECK_INTERVAL_MINUTES
        value: "60"
      - key: MAX_ITEMS_PER_SEARCH
        value: "20"
      - key: HEADLESS
        value: "true"
      - key: PYTHONUNBUFFERED
        value: "1"
